<div class="blog-protected" id="bp-{{ .Get "article_id" }}">
  <iframe src="https://blog.tmoc.qzz.io/reader?article={{ .Get "article_id" }}&redirect={{ .Page.Permalink }}" style="width:100%;height:110px;border:none" title="解锁加密文章"></iframe>
  <div class="post-content md-content bp-content"></div>
</div>
<script src="/marked.min.js"></script>
<script>
(function () {
  const ARTICLE = "{{ .Get "article_id" }}";
  const wrap = document.getElementById('bp-' + ARTICLE);
  const iframe = wrap.querySelector('iframe');
  const box = wrap.querySelector('.bp-content');
  const IFRAME_ORIGIN = 'https://blog.tmoc.qzz.io';

  function b64ToBytes(b) {
    const bin = atob(b);
    const u = new Uint8Array(bin.length);
    for (let i = 0; i < bin.length; i++) u[i] = bin.charCodeAt(i);
    return u;
  }

  // 解密后是 markdown 原文：用本地 marked 渲染成 HTML，并套用主题 .post-content 样式
  function renderText(text) {
    if (window.marked && typeof marked.parse === 'function') {
      box.innerHTML = marked.parse(text);
    } else {
      // marked 未加载（如离线）的兜底：至少保留换行
      box.style.whiteSpace = 'pre-wrap';
      box.textContent = text;
    }
  }

  async function decryptAndRender(k, iv) {
    try {
      const resp = await fetch('/cipher/' + ARTICLE + '.bin');
      if (!resp.ok) { box.textContent = '密文加载失败（确认 static/cipher/' + ARTICLE + '.bin 已发布）'; return; }
      const buf = new Uint8Array(await resp.arrayBuffer());
      const key = await crypto.subtle.importKey('raw', b64ToBytes(k), { name: 'AES-GCM' }, false, ['decrypt']);
      const pt = await crypto.subtle.decrypt({ name: 'AES-GCM', iv: b64ToBytes(iv) }, key, buf);
      renderText(new TextDecoder().decode(pt));
    } catch (e) {
      box.textContent = '解密失败：' + e;
    }
  }

  // 1) 登录回跳带 ?session= → 收下，存 github.io 第一方 localStorage（刷新免登），并从地址栏抹掉
  let session = null;
  const params = new URLSearchParams(window.location.search);
  if (params.has('session')) {
    session = params.get('session');
    try { localStorage.setItem('blog_session', session); } catch (e) {}
    params.delete('session');
    const newUrl = window.location.pathname + (params.toString() ? '?' + params.toString() : '') + window.location.hash;
    history.replaceState(null, '', newUrl);
  } else {
    try { session = localStorage.getItem('blog_session'); } catch (e) {}
  }

  // 2) 把 session 转交给 iframe（postMessage 跨域，绕过 localStorage 分区）
  function sendSession() {
    if (session && iframe && iframe.contentWindow) {
      iframe.contentWindow.postMessage({ type: 'blog:session', article: ARTICLE, session: session }, IFRAME_ORIGIN);
    }
  }
  window.addEventListener('message', function (ev) {
    const d = ev.data || {};
    if (d.type === 'blog:key' && d.article === ARTICLE) {
      decryptAndRender(d.k, d.iv);
    } else if (d.type === 'blog:ready' && d.article === ARTICLE) {
      sendSession();
    }
  });
  // iframe 可能先就绪（父脚本后执行），这里主动发一次；iframe 就绪后会再发 blog:ready 触发补发
  sendSession();
})();
</script>

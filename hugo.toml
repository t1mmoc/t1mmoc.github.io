baseURL = 'https://blog.tmoc.qzz.io/'
title = "Timmoc 的技术小屋"
# Hugo 0.158+ 用 locale 替代已弃用的 languageCode
locale = 'zh-cn'
theme = 'PaperMod'

enableEmoji = true
enableRobotsTXT = true
summaryLength = 20

[pagination]
  pagerSize = 10

# 首页输出 HTML / RSS / JSON（PaperMod 搜索依赖 JSON）
[outputs]
  home = ['HTML', 'RSS', 'JSON']

[minify]
  disableXML = true

[params]
  defaultTheme = 'auto'        # light / dark / auto
  disableThemeToggle = false

  ShowReadingTime = true
  ShowShareButtons = false
  ShowPostNavLinks = true
  ShowBreadCrumbs = true
  ShowCodeCopyButtons = true
  ShowToc = true
  TocOpen = true
  ShowRssButtonInSectionTermList = true

  # 全站开启评论区（由 layouts/_partials/comments.html 渲染）
  comments = true

  # Giscus 评论（基于 GitHub Discussions，无后端）
  # 前置：仓库已开 Discussions + 安装 giscus App + 分类选 General（非 Announcements，否则访客无法发首评）
  [params.giscus]
    repo = "t1mmoc/t1mmoc.github.io"
    repoId = "R_kgDOTODPTw"
    category = "General"
    categoryId = "DIC_kwDOTODPT84DAzVn"
    mapping = "pathname"
    strict = false
    reactionsEnabled = true
    emitMetadata = false
    inputPosition = "top"
    lang = "zh-CN"

  # 首页展示的文章分类（profileMode 关闭后，首页为文章列表）
  mainSections = ["posts"]

  # 首页站点头图 hero（头图 + 圆形头像 + 站点名 + 简介）
  [params.hero]
    avatar = "/images/avatar.svg"
    banner = "/images/banner.svg"
    subtitle = "这里记录技术笔记与日常思考，欢迎常来逛逛 👋"

  # 网站图标
  [params.assets]
    favicon = "/favicon.svg"

  # 编辑此页链接
  [params.editPost]
    URL = 'https://github.com/t1mmoc/t1mmoc.github.io/tree/main/content'
    Text = '编辑此页'
    appendFilePath = true

  # 社交图标（仅保留必要的技术相关联系方式）
  [[params.socialIcons]]
    name = 'github'
    url = 'https://github.com/t1mmoc'

[menu]
  [[menu.main]]
    identifier = 'home'
    name = '首页'
    url = '/'
    weight = 10
  [[menu.main]]
    identifier = 'tags'
    name = '标签'
    url = '/tags/'
    weight = 20
  [[menu.main]]
    identifier = 'search'
    name = '搜索'
    url = '/search/'
    weight = 30
  [[menu.main]]
    identifier = 'about'
    name = '关于'
    url = '/about/'
    weight = 40
  [[menu.main]]
    identifier = 'friends'
    name = '友链'
    url = '/friends/'
    weight = 50

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true
  [markup.highlight]
    noClasses = false

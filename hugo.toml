baseURL = 'https://t1mmoc.github.io/'
title = "Timmoc's Blog"
# Hugo 0.158+ 用 locale 替代已弃用的 languageCode
locale = 'zh-cn'
theme = 'PaperMod'

enableEmoji = true
enableRobotsTXT = true
summaryLength = 20

[pagination]
  pagerSize = 10

# 首页输出 HTML / RSS / JSON（PaperMod 搜索依赖 JSON）
[outputs]
  home = ['HTML', 'RSS', 'JSON']

[minify]
  disableXML = true

[params]
  defaultTheme = 'auto'        # light / dark / auto
  disableThemeToggle = false

  ShowReadingTime = true
  ShowShareButtons = true
  ShowPostNavLinks = true
  ShowBreadCrumbs = true
  ShowCodeCopyButtons = true
  ShowToc = true
  TocOpen = false
  ShowRssButtonInSectionTermList = true

  # 首页欢迎区
  [params.homeInfoParams]
    Title = "嗨，我是 Timmoc 👋"
    Content = "这里记录技术笔记和日常思考。欢迎常来逛逛。"

  # 编辑此页链接
  [params.editPost]
    URL = 'https://github.com/t1mmoc/t1mmoc.github.io/tree/main/content'
    Text = '编辑此页'
    appendFilePath = true

  # 社交图标
  [[params.socialIcons]]
    name = 'github'
    url = 'https://github.com/t1mmoc'

[menu]
  [[menu.main]]
    identifier = 'posts'
    name = '文章'
    url = '/posts/'
    weight = 10
  [[menu.main]]
    identifier = 'tags'
    name = '标签'
    url = '/tags/'
    weight = 20
  [[menu.main]]
    identifier = 'search'
    name = '搜索'
    url = '/search/'
    weight = 30

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true
  [markup.highlight]
    noClasses = false

baseURL = 'https://t1mmoc.github.io/'
title = "Timmoc 的技术小屋"
# Hugo 0.158+ 用 locale 替代已弃用的 languageCode
locale = 'zh-cn'
theme = 'PaperMod'

enableEmoji = true
enableRobotsTXT = true
summaryLength = 20

[pagination]
  pagerSize = 10

# 首页输出 HTML / RSS / JSON（PaperMod 搜索依赖 JSON）
[outputs]
  home = ['HTML', 'RSS', 'JSON']

[minify]
  disableXML = true

[params]
  defaultTheme = 'auto'        # light / dark / auto
  disableThemeToggle = false

  ShowReadingTime = true
  ShowShareButtons = false
  ShowPostNavLinks = true
  ShowBreadCrumbs = true
  ShowCodeCopyButtons = true
  ShowToc = true
  TocOpen = false
  ShowRssButtonInSectionTermList = true

  # 全站开启评论区（由 layouts/_partials/comments.html 渲染）
  comments = true

  # Giscus 评论（基于 GitHub Discussions，无后端）
  # 前置：仓库已开 Discussions + 安装 giscus App + 分类选 General（非 Announcements，否则访客无法发首评）
  [params.giscus]
    repo = "t1mmoc/t1mmoc.github.io"
    repoId = "R_kgDOTODPTw"
    category = "General"
    categoryId = "DIC_kwDOTODPT84DAzVn"
    mapping = "pathname"
    strict = false
    reactionsEnabled = true
    emitMetadata = false
    inputPosition = "top"
    lang = "zh-CN"

  # 首页 profile 模式（居中头像式 hero）
  [params.profileMode]
    enabled = true
    title = "Timmoc 的技术小屋"
    subtitle = "这里记录技术笔记与日常思考，欢迎常来逛逛 👋"
    imageUrl = "/images/avatar.svg"
    imageWidth = 160
    imageHeight = 160
    imageTitle = "Timmoc"
    buttons = [
      { name = "文章", url = "/posts/" },
      { name = "标签", url = "/tags/" },
      { name = "搜索", url = "/search/" },
      { name = "关于", url = "/about/" },
    ]

  # 网站图标
  [params.assets]
    favicon = "/favicon.svg"

  # 编辑此页链接
  [params.editPost]
    URL = 'https://github.com/t1mmoc/t1mmoc.github.io/tree/main/content'
    Text = '编辑此页'
    appendFilePath = true

  # 社交图标（仅保留必要的技术相关联系方式）
  [[params.socialIcons]]
    name = 'github'
    url = 'https://github.com/t1mmoc'

[menu]
  [[menu.main]]
    identifier = 'posts'
    name = '文章'
    url = '/posts/'
    weight = 10
  [[menu.main]]
    identifier = 'tags'
    name = '标签'
    url = '/tags/'
    weight = 20
  [[menu.main]]
    identifier = 'search'
    name = '搜索'
    url = '/search/'
    weight = 30
  [[menu.main]]
    identifier = 'about'
    name = '关于'
    url = '/about/'
    weight = 40

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true
  [markup.highlight]
    noClasses = false

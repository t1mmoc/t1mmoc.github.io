<!doctype html>
<html lang="zh">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>博客加密 · 管理</title>
<style>
  body { font-family: system-ui, -apple-system, "PingFang SC", sans-serif; max-width: 920px; margin: 24px auto; padding: 0 16px; color: #222; }
  h1 { font-size: 20px; } h3 { margin: 0 0 10px; font-size: 15px; }
  button { padding: 6px 12px; cursor: pointer; border: 1px solid #ccc; background: #fff; border-radius: 6px; font-size: 13px; }
  button.primary { background: #24292f; color: #fff; border-color: #24292f; }
  button.danger { color: #c00; border-color: #e5b3b3; }
  .card { border: 1px solid #ddd; border-radius: 8px; padding: 14px; margin: 14px 0; }
  .sub { border: 1px solid #eee; border-radius: 6px; padding: 10px; margin-top: 10px; background: #fafafa; }
  .row { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; margin: 6px 0; }
  input[type=text] { padding: 6px; flex: 1; min-width: 160px; border: 1px solid #ccc; border-radius: 6px; }
  .tag { display: inline-flex; align-items: center; gap: 6px; background: #eef; border: 1px solid #ccd; border-radius: 4px; padding: 3px 8px; margin: 3px; font-size: 13px; }
  .tag .x { cursor: pointer; color: #c33; font-weight: bold; }
  .muted { color: #999; font-size: 12px; }
  .msg { font-size: 12px; }
  .ok { color: #0a0; } .err { color: #c00; }
  #login { text-align: center; padding: 60px 0; }
  .hidden { display: none; }
  details summary { cursor: pointer; color: #555; font-size: 13px; margin: 4px 0; }
</style>
</head>
<body>
<h1>博客加密文章 · 管理后台</h1>

<div id="login" class="hidden">
  <p>请先以 <b>timmoc</b> 身份登录 GitHub。</p>
  <button id="loginBtn">🔐 用 GitHub 登录（管理员）</button>
  <p class="muted">登录态仅存于本域 localStorage，15 分钟有效。</p>
</div>

<div id="app" class="hidden">
  <div class="row" style="justify-content:space-between">
    <span class="muted">已登录为 <b>管理员</b></span>
    <button id="logout">退出</button>
  </div>

  <div class="card">
    <h3>读者名册（候选池）</h3>
    <p class="muted" style="margin:0 0 10px">这里只是<b>候选读者池</b>，供下方文章 ACL 快速选人。加入名册 <b>不等于</b> 授权——仍需把该用户加入具体文章的 ACL，对方才能真正解锁。</p>
    <div class="row">
      <input type="text" id="newUser" placeholder="GitHub 用户名，如 alice" list="userCandidates">
      <button class="primary" id="addUser">加入名册</button>
    </div>
    <div id="userList" class="row"></div>
  </div>

  <div class="card">
    <h3>文章列表</h3>
    <details>
      <summary>注册新文章（密钥由发布工具生成；正常发文请用 author 工具，此表单用于手动注册/迁移）</summary>
      <div class="sub">
        <div class="row"><input type="text" id="newArtId" placeholder="文章 id（与 .bin 文件名一致，如 secret-note）"></div>
        <div class="row"><input type="text" id="newArtK" placeholder="k_article（base64，由 author 工具输出）"></div>
        <div class="row"><input type="text" id="newArtIv" placeholder="iv（base64）"></div>
        <div class="row"><input type="text" id="newArtAcl" placeholder="acl，逗号分隔，如 t1mmoc,alice"></div>
        <div class="row"><button class="primary" id="addArt">注册文章</button><span id="addArtMsg" class="msg"></span></div>
      </div>
    </details>
    <div id="articleList"></div>
  </div>
</div>

<datalist id="userCandidates"></datalist>

<script>
const BLOG = 'https://blog.tmoc.qzz.io';
const SKEY = 'blog_admin_session';

function api(path, opts) {
  opts = opts || {};
  opts.headers = Object.assign({ 'x-session': localStorage.getItem(SKEY) }, opts.headers || {});
  return fetch(BLOG + path, opts).then(async r => {
    let j = null; try { j = await r.json(); } catch (e) {}
    return { ok: r.ok, status: r.status, body: j };
  });
}
function esc(s) {
  return String(s).replace(/[&<>"']/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[m]));
}
function flash(el, text, good) {
  el.textContent = text;
  el.className = 'msg ' + (good ? 'ok' : 'err');
  setTimeout(() => { if (el.textContent === text) el.textContent = ''; }, 2500);
}

function showLogin() {
  document.getElementById('login').classList.remove('hidden');
  document.getElementById('app').classList.add('hidden');
  document.getElementById('loginBtn').onclick = () => {
    const back = location.origin + location.pathname;
    location.href = BLOG + '/api/auth/authorize?redirect=' + encodeURIComponent(back) + '&admin=1';
  };
}

// ---------- 授权读者目录：增 / 删 / 查 ----------
async function renderUsers() {
  const ul = document.getElementById('userList');
  const r = await api('/api/admin/users');
  const users = (r.body && r.body.items) || [];
  const dl = document.getElementById('userCandidates');
  if (dl) { dl.innerHTML = ''; users.forEach(u => { const o = document.createElement('option'); o.value = u.github_id; dl.appendChild(o); }); }
  if (!users.length) { ul.innerHTML = '<span class="muted">暂无读者</span>'; return; }
  ul.innerHTML = '';
  users.forEach(u => {
    const tag = document.createElement('span');
    tag.className = 'tag';
    tag.innerHTML = esc(u.github_id) + ' <span class="x" title="移除">×</span>';
    tag.querySelector('.x').onclick = async () => {
      if (!confirm('从读者目录移除 ' + u.github_id + '？')) return;
      const d = await api('/api/admin/user/' + encodeURIComponent(u.github_id), { method: 'DELETE' });
      if (d.ok) renderUsers(); else alert('删除失败');
    };
    ul.appendChild(tag);
  });
}

// ---------- 文章列表：查 / 删 + 注册(增) ----------
async function renderArticles() {
  const al = document.getElementById('articleList');
  const r = await api('/api/admin/articles');
  const items = (r.body && r.body.items) || [];
  al.innerHTML = '';
  if (!items.length) { al.innerHTML = '<p class="muted">暂无文章（用 author 工具发布后会出现）。</p>'; return; }
  items.forEach(art => {
    const card = document.createElement('div');
    card.className = 'card';
    card.innerHTML =
      '<div class="row" style="justify-content:space-between">' +
        '<b>' + esc(art.id) + '</b>' +
        '<span><span class="muted">' + (art.acl || []).length + ' 人可读</span> ' +
        '<button class="danger" data-del>删除文章</button></span>' +
      '</div>' +
      '<div class="row">ACL 读者：<span class="aclTags"></span></div>' +
      '<div class="row">' +
        '<input type="text" placeholder="添加 GitHub 用户名到本文" list="userCandidates">' +
        '<button class="primary" data-add>添加读者</button>' +
        '<span class="msg"></span>' +
      '</div>';
    const aclTags = card.querySelector('.aclTags');
    (art.acl || []).forEach(g => {
      const t = document.createElement('span');
      t.className = 'tag';
      t.innerHTML = esc(g) + ' <span class="x" title="移除">×</span>';
      t.querySelector('.x').onclick = async () => {
        if (!confirm('移除 ' + g + ' 对本文的访问？')) return;
        const d = await api('/api/admin/article/' + encodeURIComponent(art.id) + '/acl', {
          method: 'PATCH', headers: { 'content-type': 'application/json' },
          body: JSON.stringify({ op: 'remove', github_id: g })
        });
        if (d.ok) renderArticles(); else alert('移除失败');
      };
      aclTags.appendChild(t);
    });
    if (!(art.acl || []).length) aclTags.innerHTML = '<span class="muted">无</span>';
    card.querySelector('[data-add]').onclick = async () => {
      const inp = card.querySelector('input');
      const v = inp.value.trim();
      if (!v) return;
      const m = card.querySelector('.msg');
      const d = await api('/api/admin/article/' + encodeURIComponent(art.id) + '/acl', {
        method: 'PATCH', headers: { 'content-type': 'application/json' },
        body: JSON.stringify({ op: 'add', github_id: v })
      });
      if (d.ok) { inp.value = ''; renderArticles(); flash(m, '已添加', true); }
      else flash(m, '添加失败', false);
    };
    card.querySelector('[data-del]').onclick = async () => {
      if (!confirm('删除文章 ' + art.id + '？\n密钥记录将从 KV 移除；仓库里的密文 .bin 仍需你手动删除，否则读者会卡在 forbidden。')) return;
      const d = await api('/api/admin/article/' + encodeURIComponent(art.id), { method: 'DELETE' });
      if (d.ok) renderArticles(); else alert('删除失败');
    };
    al.appendChild(card);
  });
}

(async function init() {
  const params = new URLSearchParams(location.search);
  if (params.has('session')) {
    localStorage.setItem(SKEY, params.get('session'));
    history.replaceState({}, '', location.pathname);
  }
  const sess = localStorage.getItem(SKEY);
  if (!sess) return showLogin();
  document.getElementById('login').classList.add('hidden');
  document.getElementById('app').classList.remove('hidden');
  document.getElementById('logout').onclick = () => { localStorage.removeItem(SKEY); location.reload(); };

  // 接口若未授权则退回登录
  const probe = await api('/api/admin/articles');
  if (probe.status === 403) { localStorage.removeItem(SKEY); return showLogin(); }

  document.getElementById('addUser').onclick = async () => {
    const v = document.getElementById('newUser').value.trim();
    if (!v) return;
    const r = await api('/api/admin/user', {
      method: 'POST', headers: { 'content-type': 'application/json' },
      body: JSON.stringify({ github_id: v })
    });
    if (r.ok) { document.getElementById('newUser').value = ''; renderUsers(); }
    else alert('添加失败');
  };

  document.getElementById('addArt').onclick = async () => {
    const id = document.getElementById('newArtId').value.trim();
    const k = document.getElementById('newArtK').value.trim();
    const iv = document.getElementById('newArtIv').value.trim();
    const acl = document.getElementById('newArtAcl').value.split(',').map(s => s.trim()).filter(Boolean);
    const m = document.getElementById('addArtMsg');
    if (!id || !k || !iv) { flash(m, 'id / k / iv 必填', false); return; }
    const r = await api('/api/admin/article', {
      method: 'POST', headers: { 'content-type': 'application/json' },
      body: JSON.stringify({ id, k_article: k, iv, acl })
    });
    if (r.ok) {
      document.getElementById('newArtId').value = '';
      document.getElementById('newArtK').value = '';
      document.getElementById('newArtIv').value = '';
      document.getElementById('newArtAcl').value = '';
      renderArticles(); flash(m, '已注册', true);
    } else flash(m, '注册失败：' + ((r.body && r.body.error) || r.status), false);
  };

  renderUsers();
  renderArticles();
})();
</script>
</body>
</html>

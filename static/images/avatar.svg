<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256" role="img" aria-label="Timmoc 的技术小屋">
  <defs>
    <radialGradient id="bg" cx="0.5" cy="0.36" r="0.9">
      <stop offset="0" stop-color="#101a3a"/>
      <stop offset="1" stop-color="#04060f"/>
    </radialGradient>
    <linearGradient id="neon" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#22d3ee"/>
      <stop offset="0.5" stop-color="#818cf8"/>
      <stop offset="1" stop-color="#e879f9"/>
    </linearGradient>
    <filter id="glow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="6.5" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
